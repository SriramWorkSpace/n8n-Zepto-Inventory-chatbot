<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zepto Inventory Assistant</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080C14;
      --surface: #0D1320;
      --surface2: #111827;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #00D4AA;
      --accent2: #0EA5E9;
      --accent-glow: rgba(0, 212, 170, 0.15);
      --text: #E8F0F8;
      --text-muted: rgba(232, 240, 248, 0.45);
      --user-bubble: #0EA5E9;
      --bot-bubble: #131E2E;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 170, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 170, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: orb-drift 12s ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      top: -150px;
      left: -100px;
      background: radial-gradient(circle, rgba(0, 212, 170, 0.08), transparent 70%);
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      bottom: -100px;
      right: -100px;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.08), transparent 70%);
      animation-delay: -6s;
    }

    @keyframes orb-drift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(30px, 20px) scale(1.05);
      }
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 780px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      animation: slide-down 0.5s ease both;
    }

    .logo {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px rgba(0, 212, 170, 0.3);
      flex-shrink: 0;
    }

    .header-info {
      flex: 1;
    }

    .header-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .header-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--accent);
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
      box-shadow: 0 0 6px var(--accent);
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.85);
      }
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
    }

    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    /* Message */
    .msg {
      display: flex;
      gap: 10px;
      animation: msg-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes msg-in {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .msg.user {
      flex-direction: row-reverse;
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .bot-avatar {
      background: linear-gradient(135deg, rgba(0, 212, 170, 0.2), rgba(14, 165, 233, 0.2));
      border: 1px solid rgba(0, 212, 170, 0.25);
    }

    .user-avatar {
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.2), rgba(14, 165, 233, 0.1));
      border: 1px solid rgba(14, 165, 233, 0.25);
      color: var(--accent2);
    }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.7;
      letter-spacing: 0.01em;
    }

    .bot-bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      color: var(--text);
      border-top-left-radius: 4px;
    }

    .user-bubble {
      background: linear-gradient(135deg, #0EA5E9, #0284C7);
      color: #fff;
      border-top-right-radius: 4px;
      box-shadow: 0 4px 16px rgba(14, 165, 233, 0.25);
    }

    /* Timestamp */
    .timestamp {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 4px;
    }

    .msg.user .timestamp {
      text-align: right;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: msg-in 0.3s ease both;
    }

    .typing-bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      padding: 14px 18px;
      border-radius: 14px;
      border-top-left-radius: 4px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: typing-bounce 1.2s ease-in-out infinite;
      opacity: 0.6;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing-bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.6;
      }

      30% {
        transform: translateY(-5px);
        opacity: 1;
      }
    }

    /* Suggestions */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 0 4px;
      animation: slide-up 0.4s 0.3s ease both;
    }

    .suggestion-chip {
      background: transparent;
      border: 1px solid rgba(0, 212, 170, 0.25);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .suggestion-chip:hover {
      background: var(--accent-glow);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 212, 170, 0.15);
    }

    /* Input area */
    .input-area {
      padding: 12px 0 20px;
      border-top: 1px solid var(--border);
      animation: slide-up 0.5s ease both;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      border-color: rgba(0, 212, 170, 0.4);
      box-shadow: 0 0 0 3px rgba(0, 212, 170, 0.06), 0 4px 20px rgba(0, 212, 170, 0.08);
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13.5px;
      line-height: 1.6;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      scrollbar-width: none;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    textarea::-webkit-scrollbar {
      display: none;
    }

    .send-btn {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 2px 10px rgba(0, 212, 170, 0.3);
    }

    .send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 16px rgba(0, 212, 170, 0.4);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    .send-btn svg {
      width: 16px;
      height: 16px;
      fill: #080C14;
    }

    .input-hint {
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 8px;
      letter-spacing: 0.02em;
    }

    .input-hint kbd {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
    }

    /* Slide animations */
    @keyframes slide-down {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slide-up {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Welcome message tag */
    .tag {
      display: inline-block;
      background: rgba(0, 212, 170, 0.1);
      border: 1px solid rgba(0, 212, 170, 0.2);
      color: var(--accent);
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="app">

    <!-- Header -->
    <div class="header">
      <div class="logo">🛒</div>
      <div class="header-info">
        <div class="header-title">Zepto Inventory Assistant</div>
        <div class="header-sub">Powered by Gemini 2.5 Flash · n8n workflow</div>
      </div>
      <div class="status-dot">
        <div class="dot"></div>
        Live
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="msg bot" id="welcome-msg">
        <div class="avatar bot-avatar">🤖</div>
        <div>
          <div class="bubble bot-bubble">
            <div class="tag">Zepto AI</div><br>
            Hey! I'm your Zepto inventory assistant. I have access to the full product catalog — ask me anything about
            prices, discounts, stock levels, or categories.
          </div>
          <div class="timestamp">Just now</div>
        </div>
      </div>
    </div>

    <!-- Suggestion chips -->
    <div class="suggestions" id="suggestions">
      <button class="suggestion-chip" onclick="sendSuggestion(this)">Which items have &gt;15% discount?</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">What's the cheapest product?</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">List out of stock items</button>
      <button class="suggestion-chip" onclick="sendSuggestion(this)">Show all dairy products</button>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrap">
        <textarea id="input" placeholder="Ask about products, prices, discounts..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </div>
      <div class="input-hint"><kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for new line</div>
    </div>

  </div>

  <script>
    const WEBHOOK_URL = 'http://localhost:5678/webhook-test/zepto-query';

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const suggestionsEl = document.getElementById('suggestions');

    // Enable/disable send button
    inputEl.addEventListener('input', () => {
      sendBtn.disabled = !inputEl.value.trim();
    });

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) sendMessage();
      }
    }

    function getTime() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      const time = getTime();

      if (role === 'user') {
        div.innerHTML = `
        <div class="avatar user-avatar">U</div>
        <div>
          <div class="bubble user-bubble">${escapeHtml(text)}</div>
          <div class="timestamp">${time}</div>
        </div>`;
      } else {
        div.innerHTML = `
        <div class="avatar bot-avatar">🤖</div>
        <div>
          <div class="bubble bot-bubble">${escapeHtml(text)}</div>
          <div class="timestamp">${time}</div>
        </div>`;
      }

      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing-indicator';
      div.innerHTML = `
      <div class="avatar bot-avatar">🤖</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>`;
      messagesEl.appendChild(div);
      scrollToBottom();
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    function scrollToBottom() {
      messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    function sendSuggestion(btn) {
      inputEl.value = btn.textContent;
      suggestionsEl.style.display = 'none';
      sendMessage();
    }

    async function sendMessage() {
      const query = inputEl.value.trim();
      if (!query) return;

      // Hide suggestions after first message
      suggestionsEl.style.display = 'none';

      // Add user message
      addMessage(query, 'user');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      // Show typing
      showTyping();

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });

        const data = await res.json();
        hideTyping();
        addMessage(data.answer || 'Sorry, I could not get a response.', 'bot');

      } catch (err) {
        hideTyping();
        // For demo purposes, show a mock response if webhook isn't connected
        const mockResponses = {
          default: "I'm connected to the Zepto inventory database via n8n. To see real responses, connect this to your n8n webhook URL at the top of the script."
        };
        addMessage(mockResponses.default, 'bot');
      }
    }
  </script>

</body>

</html>
